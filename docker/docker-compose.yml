version: "3.8"

services:
  # ---- Ollama 服务 ----
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_NUM_PARALLEL=1
    # GPU 加速（如果主机有 NVIDIA GPU）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - rag-network

  # ---- RAG 应用 ----
  rag-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-app
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - rag_data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:3b
      - EMBEDDING_PROVIDER=local
      - LLM_PROVIDER=local
      - SECRET_KEY=${SECRET_KEY:-}
      - DEBUG=${DEBUG:-false}
      - STREAMLIT_PORT=8501
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rag-network

volumes:
  ollama_data:
    driver: local
  rag_data:
    driver: local

networks:
  rag-network:
    driver: bridge
