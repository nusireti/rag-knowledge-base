# Streamlit Cloud 部署配置
# 在 https://share.streamlit.io 部署后，
# 在 App 设置 → Secrets 中填入以下内容

[app]
SECRET_KEY = "rag-kb-secret-key-2026"
DEBUG = "false"

# LLM 配置 (云端需用 OpenAI 或其他 API)
# 注册 https://platform.openai.com 获取 key
# LLM_PROVIDER = "openai"
# OPENAI_API_KEY = "sk-xxxxx"
# OPENAI_LLM_MODEL = "gpt-4o-mini"

# 如果用 Ollama 搭配云端部署（需要外部 Ollama 服务器）
# LLM_PROVIDER = "local"
# OLLAMA_BASE_URL = "https://your-ollama-server:11434"
# OLLAMA_MODEL = "qwen2.5:3b"

# Embedding (云端用 OpenAI 更快)
# EMBEDDING_PROVIDER = "openai"
# OPENAI_API_KEY = "sk-xxxxx"

# SMTP (注册验证码)
# SMTP_ENABLE = "false"
# SMTP_HOST = "smtp.qq.com"
# SMTP_PORT = "587"
# SMTP_USER = "your@qq.com"
# SMTP_PASSWORD = "your-smtp-code"
# SMTP_FROM = "your@qq.com"
